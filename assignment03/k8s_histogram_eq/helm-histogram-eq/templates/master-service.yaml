apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-histogram-eq.fullname" . }}-master-svc
  labels:
    app.kubernetes.io/name: {{ include "helm-histogram-eq.name" . }}-master
spec:
  type: {{ .Values.master.service.type }}
  ports:
    - port: {{ .Values.master.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.master.service.tcpPort }}
      targetPort: tcp-coord
      protocol: TCP
      name: tcp-coord
  selector:
    app.kubernetes.io/name: {{ include "helm-histogram-eq.name" . }}-master
